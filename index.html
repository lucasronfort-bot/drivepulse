<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0b1020">
<title>DrivePulse V3</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="app">
<header>
<p class="eyebrow">Toyota C-HR · Prototype V3</p>
<h1>DrivePulse</h1>
<p id="status" class="status">Prêt</p>
</header>

<section class="panel">
<label>Style musical
<select id="styleSelect">
<option value="synthwave">Synthwave Drive</option>
<option value="cinematic">Cinematic Road</option>
</select>
</label>
<label class="toggle"><input id="quantizeToggle" type="checkbox" checked> Transitions calées sur le prochain temps</label>
</section>

<section class="controls">
<button id="startBtn" class="primary">Charger et démarrer</button>
<button id="calibrateBtn" disabled>Calibrer</button>
<button id="stopBtn" disabled>Arrêter</button>
</section>

<section class="dashboard">
<article class="speed-card"><span>Vitesse GPS</span><strong><span id="speed">0</span> km/h</strong></article>
<article class="metric"><div><span>Accélération</span><output id="accelValue">0.00</output></div><meter id="accelMeter" min="0" max="1" value="0"></meter></article>
<article class="metric"><div><span>Freinage</span><output id="brakeValue">0.00</output></div><meter id="brakeMeter" min="0" max="1" value="0"></meter></article>
<article class="metric"><div><span>Virage</span><output id="turnValue">0.00</output></div><meter id="turnMeter" min="0" max="1" value="0"></meter></article>
<article class="metric"><div><span>Intensité</span><output id="musicValue">0.00</output></div><meter id="musicMeter" min="0" max="1" value="0"></meter></article>
</section>

<section class="panel">
<h2>État musical</h2>
<div class="state-grid">
<div><span>Batterie</span><strong id="drumState">Ambiance</strong></div>
<div><span>Freinage</span><strong id="brakeState">Normal</strong></div>
<div><span>Virage</span><strong id="turnState">Calme</strong></div>
</div>
<button id="demoBtn" disabled>Mode démonstration</button>
</section>

<section class="panel">
<h2>Réglages</h2>
<label>Sensibilité accélération <input id="accelSensitivity" type="range" min="0.6" max="1.8" step="0.05" value="1"></label>
<label>Sensibilité virage <input id="turnSensitivity" type="range" min="0.6" max="1.8" step="0.05" value="1"></label>
</section>

<section class="notes"><h2>Sécurité</h2><p>Manipulations à l’arrêt ou par un passager uniquement. Le téléphone doit rester rigidement fixé.</p></section>
</main>
<script src="app.js"></script>
</body>
</html>
