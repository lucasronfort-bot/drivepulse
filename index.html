<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#0b1020"><title>DrivePulse V2</title><link rel="manifest" href="manifest.webmanifest"><link rel="stylesheet" href="style.css"></head><body><main class="app"><header><p class="eyebrow">Toyota C-HR · Prototype V2</p><h1>DrivePulse</h1><p id="status">Prêt à charger la musique</p></header><section class="controls"><button id="startBtn" class="primary">Charger et démarrer</button><button id="calibrateBtn" disabled>Calibrer</button><button id="stopBtn" disabled>Arrêter</button></section><section class="dashboard"><article class="speed"><span>Vitesse GPS</span><strong><span id="speed">0</span> km/h</strong></article><article class="metric"><div><span>Accélération</span><output id="accelValue">0.00</output></div><meter id="accelMeter" min="0" max="1" value="0"></meter></article><article class="metric"><div><span>Freinage</span><output id="brakeValue">0.00</output></div><meter id="brakeMeter" min="0" max="1" value="0"></meter></article><article class="metric"><div><span>Virage</span><output id="turnValue">0.00</output></div><meter id="turnMeter" min="0" max="1" value="0"></meter></article><article class="metric"><div><span>Intensité musicale</span><output id="musicValue">0.00</output></div><meter id="musicMeter" min="0" max="1" value="0"></meter></article></section><section class="panel"><h2>Couches musicales</h2><div class="stems"><label>Ambiance<input id="ambientGain" type="range" min="0" max="1" step="0.01" value="1"></label><label>Basse<input id="bassGain" type="range" min="0" max="1" step="0.01" value="1"></label><label>Batterie<input id="drumsGain" type="range" min="0" max="1" step="0.01" value="1"></label><label>Mélodie<input id="melodyGain" type="range" min="0" max="1" step="0.01" value="1"></label></div><button id="demoBtn" disabled>Mode démonstration</button></section><section class="panel"><h2>Sécurité</h2><p>Manipulations à l’arrêt ou par un passager. Fixe l’iPhone rigidement avant la calibration.</p></section></main><script src="app.js"></script></body></html>
